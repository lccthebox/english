<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더박스 갤러리 | 원어민회화스터디</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --white:#fff;--bg:#F5F4F2;--ink:#1a1a1a;--ink-soft:#444;--ink-mute:#777;
  --red:#CC2222;--red-dark:#A81818;--red-light:#FFF0F0;--border:#E2E0DE;--radius:14px;--px:5%;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.6;overflow-x:hidden}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);padding:0 var(--px);height:58px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-logo{font-size:16px;font-weight:900;color:var(--ink);text-decoration:none;flex-shrink:0}
.nav-logo span{color:var(--red)}
.nav-links{display:flex;gap:20px;list-style:none;align-items:center}
.nav-links a{font-size:13px;color:var(--ink-mute);text-decoration:none;transition:color .2s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:var(--red);font-weight:700}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-academy{color:#1A5FCC!important;font-size:13px!important;font-weight:600!important;text-decoration:none;white-space:nowrap}
.nav-live{color:#7C3AED;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap}
.nav-cta{background:var(--red);color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap;transition:all .2s}
.nav-cta:hover{background:var(--red-dark)}
/* HERO */
.page-hero{padding:48px var(--px) 36px;background:var(--ink);position:relative;overflow:hidden;text-align:center}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(204,34,34,.18) 0%,transparent 70%);pointer-events:none}
.page-hero>*{position:relative;z-index:1}
.hero-ey{font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,150,150,.8);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.hero-ey::before,.hero-ey::after{content:'';width:14px;height:2px;background:rgba(255,150,150,.6)}
.page-hero h1{font-size:clamp(26px,4vw,48px);font-weight:900;color:#fff;margin-bottom:10px}
.page-hero h1 em{color:var(--red);font-style:normal}
.page-hero p{font-size:13px;color:rgba(255,255,255,.5);max-width:400px;margin:0 auto}
/* FILTER BAR */
.filter-wrap{background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:58px;z-index:90}
.filter-inner{max-width:1400px;margin:0 auto;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;overflow-x:auto;scrollbar-width:none}
.filter-inner::-webkit-scrollbar{display:none}
.filter-left{display:flex;flex-shrink:0}
.fb{background:transparent;border:none;padding:14px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ink-mute);white-space:nowrap;position:relative;transition:color .2s}
.fb::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--red);transform:scaleX(0);transition:transform .25s}
.fb.active{color:var(--red);font-weight:700}
.fb.active::after{transform:scaleX(1)}
.fc{display:inline-block;background:var(--red-light);color:var(--red);font-size:10px;font-weight:700;padding:1px 6px;border-radius:50px;margin-left:4px}
.fb.active .fc{background:var(--red);color:#fff}

/* GALLERY */
.gal-wrap{padding:28px var(--px) 56px;max-width:1400px;margin:0 auto}
.gal-grid{columns:4;column-gap:10px}
@media(max-width:1024px){.gal-grid{columns:3}}
@media(max-width:640px){.gal-grid{columns:2}}
.gi{break-inside:avoid;margin-bottom:10px;border-radius:10px;overflow:hidden;background:var(--border);position:relative;cursor:pointer;display:block}
.gi img{width:100%;display:block;transition:transform .4s}
.gi:hover img{transform:scale(1.04)}
.gi-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);opacity:0;transition:opacity .3s;display:flex;align-items:flex-end;justify-content:space-between;padding:10px 12px}
.gi:hover .gi-ov{opacity:1}
.gi-cat{font-size:10px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase;background:var(--red);padding:2px 8px;border-radius:50px}


.sk{break-inside:avoid;margin-bottom:10px;border-radius:10px;background:#e0ddd9;animation:sk 1.4s ease-in-out infinite}
.sk-grid{columns:4;column-gap:10px}
@media(max-width:1024px){.sk-grid{columns:3}}
@media(max-width:640px){.sk-grid{columns:2}}
@keyframes sk{0%,100%{opacity:1}50%{opacity:.45}}
.empty-box{text-align:center;padding:80px 20px;color:var(--ink-mute)}
.empty-box .ei{font-size:52px;margin-bottom:16px}
.more-wrap{text-align:center;margin-top:20px}
.btn-more{background:transparent;color:var(--red);border:1.5px solid var(--red);padding:10px 28px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-more:hover{background:var(--red);color:#fff}
/* UPLOAD MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center;padding:20px}
.mbg.open{display:flex}
.mbox{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;position:relative;max-height:90vh;overflow-y:auto}
.mbox h2{font-size:20px;font-weight:900;margin-bottom:20px}
.mx{position:absolute;top:16px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-mute)}
.fr{margin-bottom:16px}
.fr label{display:block;font-size:11px;font-weight:700;color:var(--ink-mute);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.fr input,.fr select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:border .2s}
.fr input:focus,.fr select:focus{border-color:var(--red)}
.dz{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.dz:hover,.dz.drag{border-color:var(--red);background:var(--red-light)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:30px;margin-bottom:8px}
.dz p{font-size:13px;color:var(--ink-mute)}
.dz strong{color:var(--red)}
.pv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.pv-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:var(--bg)}
.pv-item img{width:100%;height:100%;object-fit:cover}
.pv-rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:50px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px}
.sub-btn:hover{background:var(--red-dark)}
.sub-btn:disabled{opacity:.5;cursor:not-allowed}
.up-prog{margin-top:12px;font-size:13px;color:var(--ink-mute);text-align:center;min-height:18px}
.pb-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.pb{height:100%;background:var(--red);border-radius:2px;transition:width .3s;width:0}
/* LIGHTBOX */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-img{max-width:90vw;max-height:88vh;border-radius:8px;object-fit:contain}
.lb-x{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.8}
.lb-pv,.lb-nx{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;cursor:pointer;width:44px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:background .2s}
.lb-pv{left:12px}.lb-nx{right:12px}
.lb-pv:hover,.lb-nx:hover{background:rgba(255,255,255,.3)}
.lb-ct{position:absolute;top:16px;left:20px;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px}
.lb-num{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px}
/* CTA / FOOTER */
.cta-bar{background:var(--red);padding:28px var(--px);text-align:center}
.cta-bar p{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:10px}
.cta-bar a{display:inline-block;background:#fff;color:var(--red);border-radius:50px;padding:10px 26px;font-size:14px;font-weight:700;text-decoration:none}
.cta-bar a:hover{background:var(--red-light)}
footer{background:#111;padding:24px var(--px);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.fl-logo{font-size:14px;font-weight:900;color:rgba(255,255,255,.7)}
.fl-logo span{color:var(--red)}
.fl-info{font-size:11px;color:rgba(255,255,255,.3);line-height:1.8}

.fade-up{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
@media(max-width:768px){
  nav{height:auto!important;flex-wrap:wrap;padding:8px var(--px) 0!important;gap:0!important}
  .nav-logo{order:1;font-size:14px!important}
  .nav-right{order:2;flex-shrink:0;gap:6px!important}
  .nav-academy,.nav-live{display:flex!important;font-size:10px!important;font-weight:600!important;white-space:nowrap}
  .nav-cta{font-size:10px!important;padding:6px 10px!important}
  .nav-links{order:3;display:flex!important;flex-basis:100%;gap:0!important;justify-content:space-between;border-top:1px solid var(--border);margin-top:8px;padding:7px 0 8px;overflow-x:auto;scrollbar-width:none}
  .nav-links::-webkit-scrollbar{display:none}
  .nav-links li{flex:1;text-align:center}
  .nav-links a{font-size:11px!important;white-space:nowrap;color:var(--ink-mute)!important;font-weight:500;padding:2px 4px;display:block}
  .nav-links a.active{color:var(--red)!important;font-weight:700}
  .filter-wrap{top:auto;position:relative}
  .up-btn{margin-left:4px;padding:7px 12px;font-size:11px}
}
/* 플로팅 */
.fl-btns{position:fixed;bottom:28px;right:20px;z-index:400;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fl-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s;flex-shrink:0}
.fl-btn:hover{transform:scale(1.1)}
.fl-lbl{background:rgba(20,20,20,.82);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;opacity:0;transform:translateX(8px);transition:opacity .2s,transform .2s;pointer-events:none}
.fl-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.fl-row:hover .fl-lbl{opacity:1;transform:translateX(0)}
@media(max-width:768px){.fl-lbl{display:none}.fl-btns{bottom:20px;right:14px;gap:8px}.fl-btn{width:46px;height:46px}}
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://oualwikibctxvlscpuyn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91YWx3aWtpYmN0eHZsc2NwdXluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjA5MDcsImV4cCI6MjA5MDA5NjkwN30.F6c_Pc0X5OnzlJteCmFkuyBbWihT24yJrnqBPCTbyPM'
);
const CATS = {study:'스터디',party:'파티',outing:'아웃팅',event:'이벤트'};
const PAGE = 24;
let all=[], filtered=[], curPage=0, lbI=0, files=[];

// 로드
async function load(){
  try{
    const {data}=await sb.from('gallery').select('*').eq('is_published',true).order('created_at',{ascending:false});
    all=(data&&data.length)?data.map(d=>({id:d.id,url:d.image_url,cat:d.category,cap:d.caption||''})):[];
  }catch(e){all=[];}
  document.getElementById('galSkel').style.display='none';
  setCounts(); applyFilter('all');
}

function setCounts(){
  document.getElementById('cnt-all').textContent=all.length;
  ['study','party','outing','event'].forEach(c=>{
    const el=document.getElementById('cnt-'+c);
    if(el) el.textContent=all.filter(p=>p.cat===c).length;
  });
}

function applyFilter(cat){
  curPage=0;
  filtered=cat==='all'?all:all.filter(p=>p.cat===cat);
  document.getElementById('galGrid').innerHTML='';
  document.getElementById('galEmpty').style.display=filtered.length?'none':'block';
  renderMore();
}

window.renderMore=function(){
  const g=document.getElementById('galGrid');
  filtered.slice(curPage*PAGE,(curPage+1)*PAGE).forEach((p,i)=>{
    const idx=curPage*PAGE+i;
    const d=document.createElement('div');
    d.className='gi';
    d.innerHTML=`<img src="${p.url}" alt="${p.cap}" loading="lazy" onerror="this.parentElement.style.display='none'">
      <div class="gi-ov">
        <span class="gi-cat">${CATS[p.cat]||p.cat}</span>
        
      </div>`;
    d.querySelector('img').onclick=()=>openLb(idx);
    
    g.appendChild(d);
  });
  curPage++;
  document.getElementById('moreWrap').style.display=curPage*PAGE<filtered.length?'block':'none';
};

window.setFilter=function(cat,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter(cat);
};



window.doUpload=async function(){
  if(!files.length){alert('사진을 선택해주세요!');return;}
  const cat=document.getElementById('upCat').value;
  const cap=document.getElementById('upCaption').value.trim();
  const btn=document.getElementById('subBtn');
  const prog=document.getElementById('upProg');
  const pb=document.getElementById('pb');
  const pbWrap=document.getElementById('pbWrap');
  btn.disabled=true; pbWrap.style.display='block';
  const added=[];
  for(let i=0;i<files.length;i++){
    prog.textContent=`업로드 중... (${i+1}/${files.length})`;
    pb.style.width=`${((i+1)/files.length)*90}%`;
    try{
      const f=files[i];
      const ext=f.name.split('.').pop().toLowerCase();
      const path=`gallery/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error:sErr}=await sb.storage.from('gallery-images').upload(path,f,{cacheControl:'3600',upsert:false});
      if(sErr) throw sErr;
      const {data:{publicUrl}}=sb.storage.from('gallery-images').getPublicUrl(path);
      const {data:row,error:dErr}=await sb.from('gallery').insert({image_url:publicUrl,category:cat,caption:cap,is_published:true}).select().single();
      if(dErr) throw dErr;
      added.push({id:row.id,url:publicUrl,cat,cap});
    }catch(e){
      prog.textContent=`❌ 실패: ${e.message}`;
      btn.disabled=false; return;
    }
  }
  pb.style.width='100%';
  prog.textContent=`✅ ${added.length}장 업로드 완료!`;
  all=[...added,...all];
  setCounts();
  applyFilter(document.querySelector('.fb.active').dataset.cat||'all');
  setTimeout(()=>{closeModal();btn.disabled=false;},1000);
};

// Lightbox
function openLb(i){ lbI=i; document.getElementById('lb').classList.add('open'); document.body.style.overflow='hidden'; updLb(); }
function updLb(){
  const p=filtered[lbI]; if(!p)return;
  document.getElementById('lbImg').src=p.url;
  document.getElementById('lbCat').textContent=CATS[p.cat]||p.cat;
  document.getElementById('lbNum').textContent=`${lbI+1} / ${filtered.length}`;
}
window.lbMove=function(d){ lbI=(lbI+d+filtered.length)%filtered.length; updLb(); };
window.lbBg=function(e){ if(e.target.id==='lb') closeLb(); };
window.closeLb=function(){ document.getElementById('lb').classList.remove('open'); document.body.style.overflow=''; };
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowRight') lbMove(1);
  if(e.key==='ArrowLeft') lbMove(-1);
  if(e.key==='Escape') closeLb();
});

// fade
const fo=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');fo.unobserve(e.target);}});},{threshold:.07});
document.querySelectorAll('.fade-up').forEach(el=>fo.observe(el));

load();
